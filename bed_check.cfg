[gcode_macro PROBE]
description: Eddy-ng compatible probe wrapper
variable_last_z_result: 0
gcode:
    # Run Eddy probe
    PROBE_EDDY_NG_PROBE_STATIC

    # Pull result from eddy macro
    {% set z = printer["gcode_macro PROBE_EDDY_NG_PROBE_STATIC"].last_result|float %}

    # Store locally like a probe would
    SET_GCODE_VARIABLE MACRO=PROBE VARIABLE=last_z_result VALUE={z}

    RESPOND MSG="PROBE result: {z}"

[gcode_macro VERIFY_BED_STABILITY_MULTI]
description: Multi-point thermal stability verification with smart early exit

# Persistent state variables (shared with loop)
variable_last_values: [0,0,0,0,0]
variable_stable_count: 0
variable_last_max_delta: 999

gcode:
    {% set BED_TEMP = params.BED_TEMP|default(100)|int %}
    {% set WAIT = params.WAIT|default(30)|int %}

    M117 Heating bed to {BED_TEMP}
    M140 S{BED_TEMP}
    M190 S{BED_TEMP}

    # Ensure known position
    G28
    G90

    M117 Initial multi-point 

    # Take first measurement (baseline)
    RUN_MULTI_POINT_PROBE

    # Store baseline values for future comparison
    SET_GCODE_VARIABLE MACRO=VERIFY_BED_STABILITY_MULTI VARIABLE=last_values VALUE="{printer['gcode_macro RUN_MULTI_POINT_PROBE'].results}"

    # Reset stability tracking
    SET_GCODE_VARIABLE MACRO=VERIFY_BED_STABILITY_MULTI VARIABLE=stable_count VALUE=0

    # Initialize previous delta (large so trend works correctly)
    SET_GCODE_VARIABLE MACRO=VERIFY_BED_STABILITY_MULTI VARIABLE=last_max_delta VALUE=999

    # Start control loop after WAIT seconds
    UPDATE_DELAYED_GCODE ID=BED_STABILITY_MULTI_LOOP DURATION={WAIT}

[gcode_macro RUN_MULTI_POINT_PROBE]
description: Probe 5 fixed points and store Z results
variable_results: [0,0,0,0,0]

gcode:
    # Define probing boundaries (offset from edges)
    {% set xmin = 20 %}
    {% set xmax = printer.toolhead.axis_maximum.x - 20 %}
    {% set ymin = 20 %}
    {% set ymax = printer.toolhead.axis_maximum.y - 20 %}

    # Center point
    {% set cx = printer.toolhead.axis_maximum.x / 2 %}
    {% set cy = printer.toolhead.axis_maximum.y / 2 %}

    # 5-point layout: FL, FR, C, BL, BR
    {% set points = [
        (xmin, ymin),
        (xmax, ymin),
        (cx, cy),
        (xmin, ymax),
        (xmax, ymax)
    ] %}

    {% set results = [] %}

    # Probe each point and collect Z values
    {% for p in points %}
        G0 X{p[0]} Y{p[1]} F6000
        PROBE
        {% set z = printer["gcode_macro PROBE"].last_z_result|float %}
        {% set results = results + [z] %}
    {% endfor %}

    # Save results to macro variable (accessible globally)
    SET_GCODE_VARIABLE MACRO=RUN_MULTI_POINT_PROBE VARIABLE=results VALUE="{results}"

[delayed_gcode BED_STABILITY_MULTI_LOOP]
gcode:
    # ---- Tunable parameters ----
    {% set TOL = 0.004 %}        # Stability threshold (4 microns)
    {% set REQUIRED = 3 %}       # Required consecutive stable cycles
    {% set WAIT = 30 %}          # Delay between checks (seconds)
    {% set TREND_TOL = 0.001 %}  # Trend flatness threshold

    # ---- Take new measurement ----
    RUN_MULTI_POINT_PROBE

    {% set new_vals = printer["gcode_macro RUN_MULTI_POINT_PROBE"].results %}
    {% set old_vals = printer["gcode_macro VERIFY_BED_STABILITY_MULTI"].last_values %}
    {% set stable = printer["gcode_macro VERIFY_BED_STABILITY_MULTI"].stable_count|int %}
    {% set last_delta = printer["gcode_macro VERIFY_BED_STABILITY_MULTI"].last_max_delta|float %}

    # ---- Compute maximum drift across all points ----
    {% set max_delta = 0.0 %}

    {% for i in range(new_vals|length) %}
        {% set delta = (new_vals[i] - old_vals[i])|abs %}
        {% if delta > max_delta %}
            {% set max_delta = delta %}
        {% endif %}
    {% endfor %}

    # ---- Compute trend (change in drift between cycles) ----
    {% set trend = (last_delta - max_delta)|abs %}

    { action_respond_info("Max drift: %.5f mm | Trend: %.5f" % (max_delta, trend)) }

    # ---- Stability counter logic ----
    # If below tolerance → increment stability counter
    # Otherwise → reset (bed still moving)
    {% if max_delta < TOL %}
        {% set stable = stable + 1 %}
    {% else %}
        {% set stable = 0 %}
    {% endif %}

    # ---- Save updated state ----
    SET_GCODE_VARIABLE MACRO=VERIFY_BED_STABILITY_MULTI VARIABLE=last_values VALUE="{new_vals}"
    SET_GCODE_VARIABLE MACRO=VERIFY_BED_STABILITY_MULTI VARIABLE=stable_count VALUE={stable}
    SET_GCODE_VARIABLE MACRO=VERIFY_BED_STABILITY_MULTI VARIABLE=last_max_delta VALUE={max_delta}

    # ---- 🧠 SMART EARLY EXIT ----
    # Exit if:
    # - Already close to stable (within 2x tolerance)
    # - Drift change between cycles is extremely small (flat trend)
    {% if max_delta < (TOL * 2) and trend < TREND_TOL %}
        M117 Early stabilization detected
        { action_respond_info("Smart exit: thermal equilibrium reached") }

    # ---- ✅ NORMAL STABILITY EXIT ----
    {% elif stable >= REQUIRED %}
        M117 Bed fully stabilized
        { action_respond_info("Thermal stability confirmed (multi-point)") }

    # ---- 🔁 CONTINUE LOOP ----
    {% else %}
        UPDATE_DELAYED_GCODE ID=BED_STABILITY_MULTI_LOOP DURATION={WAIT}
    {% endif %}

